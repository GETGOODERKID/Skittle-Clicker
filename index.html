<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Candy Orb Idle</title>
<style>
  :root {
    --bg1: #1a0033;
    --bg2: #0d001a;
    --panel: rgba(0,0,0,0.5);
    --panel2: rgba(255,255,255,0.08);
    --text: #fff;
    --muted: rgba(255,255,255,0.65);
    --accent: #ffcc66;
    --accent2: #ff7bd5;
    --good: #6dff9a;
    --bad: #ff6b7d;
    --border: rgba(255,255,255,0.15);
    --gold: #ffd700;
  }

  * { box-sizing: border-box; }
  html, body { width: 100%; height: 100%; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: linear-gradient(135deg, var(--bg1), var(--bg2));
    color: var(--text);
    overflow: hidden;
    -webkit-user-select: none;
    user-select: none;
  }

  #game { display: flex; height: 100vh; width: 100vw; }

  #left {
    flex: 0 0 60%;
    min-width: 0;
    background: var(--panel);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    min-height: 0;
    backdrop-filter: blur(10px);
  }

  #right {
    flex: 0 0 40%;
    min-width: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
    position: relative;
    background: linear-gradient(180deg, rgba(255,102,204,0.06) 0%, transparent 100%);
    overflow-y: auto;
  }

  #rainContainer {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 1;
  }

  #game.shake { animation: shake 0.22s linear 1; }

  @keyframes shake {
    0% { transform: translate(0,0); }
    20% { transform: translate(-3px,1px); }
    40% { transform: translate(3px,-2px); }
    60% { transform: translate(-2px,2px); }
    80% { transform: translate(2px,-1px); }
    100% { transform: translate(0,0); }
  }

  h1 {
    margin: 0 0 12px 0;
    font-size: 1.6em;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  #topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    padding: 12px 14px;
    border-bottom: 1px solid var(--border);
    background: rgba(0,0,0,0.3);
    flex-wrap: wrap;
    width: 100%;
  }

  #prestigeBadge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-weight: 700;
    background: rgba(255,215,0,0.15);
    border: 1px solid rgba(255,215,0,0.4);
    border-radius: 999px;
    padding: 8px 14px;
    box-shadow: 0 0 20px rgba(255,215,0,0.15);
    font-size: 0.95em;
  }

  .tabs {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    justify-content: flex-end;
    flex: 1;
  }

  .tab {
    background: rgba(255,255,255,0.08);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
    cursor: pointer;
    transition: all 0.15s ease;
    font-weight: 600;
    font-size: 0.9em;
  }

  .tab:hover { background: rgba(255,255,255,0.12); transform: translateY(-1px); }

  .tab.active {
    background: linear-gradient(135deg, rgba(255,204,102,0.3), rgba(255,123,213,0.2));
    border-color: rgba(255,204,102,0.6);
    box-shadow: 0 0 15px rgba(255,204,102,0.15);
  }

  .panel {
    display: none;
    min-height: 0;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 12px;
    flex: 1;
  }

  .panel.active { display: block; }

  .panel::-webkit-scrollbar { width: 8px; }
  .panel::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); }
  .panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }
  .panel::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.3); }

  .stats {
    margin: 12px auto;
    max-width: 520px;
    line-height: 1.6;
    padding: 12px;
    background: rgba(255,255,255,0.06);
    border: 1px solid var(--border);
    border-radius: 12px;
    box-shadow: inset 0 0 20px rgba(255,102,204,0.08);
    font-size: 0.85em;
  }

  .stat-row { display: flex; justify-content: space-between; gap: 12px; margin: 6px 0; }
  .stat-label { color: var(--muted); }
  .stat-value { color: var(--accent); font-weight: 700; }

  .orb {
    width: min(180px, 50vw);
    max-width: 180px;
    cursor: pointer;
    user-select: none;
    -webkit-user-drag: none;
    filter: drop-shadow(0 0 20px rgba(255,102,204,0.25));
    transition: transform 0.08s cubic-bezier(0.34,1.56,0.64,1);
    margin-bottom: 16px;
  }

  .orb:active { transform: scale(0.92); }
  .orb:hover { filter: drop-shadow(0 0 30px rgba(255,102,204,0.4)); }

  .main-btn {
    width: 100%;
    margin: 6px 0;
    padding: 12px 14px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    color: var(--text);
    background: linear-gradient(180deg, rgba(255,255,255,0.12), rgba(255,255,255,0.06));
    border: 1px solid rgba(255,255,255,0.15);
    text-align: left;
    transition: all 0.12s cubic-bezier(0.34,1.56,0.64,1);
    box-shadow: 0 4px 15px rgba(0,0,0,0.25);
    font-weight: 600;
    font-size: 0.95em;
  }

  .main-btn:hover:not([disabled]) {
    background: linear-gradient(180deg, rgba(255,255,255,0.18), rgba(255,255,255,0.1));
    border-color: rgba(255,204,102,0.5);
    box-shadow: 0 6px 20px rgba(0,0,0,0.35), 0 0 25px rgba(255,204,102,0.15);
    transform: translateY(-2px);
  }

  .main-btn:active:not([disabled]) { transform: translateY(0) scale(0.98); }
  .main-btn[disabled] { opacity: 0.35; cursor: not-allowed; }

  .main-btn small {
    display: block;
    margin-top: 4px;
    color: var(--muted);
    line-height: 1.4;
    font-weight: 500;
    font-size: 0.85em;
  }

  .main-btn.cant-afford { opacity: 0.5; }
  .main-btn.locked { opacity: 0.4; }
  .main-btn.unlocked { border-color: rgba(109,255,154,0.3); }
  .main-btn.available-prestige {
    border-color: rgba(255,215,0,0.4);
    background: linear-gradient(180deg, rgba(255,215,0,0.1), rgba(255,215,0,0.05));
  }

  .section-title {
    margin: 14px 0 10px;
    font-size: 0.85em;
    opacity: 0.8;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    font-weight: 700;
    color: var(--accent);
  }

  .card {
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px;
    margin-bottom: 12px;
  }

  .row { display: flex; gap: 8px; flex-wrap: wrap; }
  .row .main-btn { flex: 1 1 160px; }

  #msg {
    min-height: 24px;
    margin: 0;
    padding: 8px 12px;
    color: var(--accent);
    font-weight: 700;
    font-size: 0.95em;
    text-shadow: 0 0 10px rgba(255,204,102,0.3);
  }

  .particle {
    position: fixed;
    pointer-events: none;
    font-size: 20px;
    z-index: 9999;
    animation: floatUp 700ms ease-out forwards;
    text-shadow: 0 0 15px rgba(255,255,255,0.3);
    font-weight: 700;
  }

  @keyframes floatUp {
    0% { transform: translateY(0) scale(1) rotate(0deg); opacity: 1; }
    100% { transform: translateY(-100px) scale(1.2) rotate(8deg); opacity: 0; }
  }

  .achievement {
    display: flex;
    justify-content: space-between;
    gap: 12px;
    padding: 10px 12px;
    margin-bottom: 8px;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: rgba(255,255,255,0.04);
    transition: all 0.2s ease;
  }

  .achievement.done {
    border-color: rgba(109,255,154,0.4);
    background: rgba(109,255,154,0.08);
    box-shadow: 0 0 20px rgba(109,255,154,0.1);
  }

  .achievement small { color: var(--muted); display: block; font-size: 0.85em; }

  .upg-status { font-size: 0.8em; margin-top: 4px; color: var(--muted); font-weight: 600; }
  .upg-status.locked { color: var(--bad); }
  .upg-status.available { color: var(--good); }

  textarea.savebox {
    width: 100%;
    min-height: 100px;
    resize: vertical;
    background: rgba(0,0,0,0.4);
    color: var(--accent);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px;
    margin-top: 8px;
    font-family: 'Courier New', monospace;
    font-size: 0.85em;
  }

  .pill {
    display: inline-block;
    border: 1px solid var(--accent);
    background: rgba(255,204,102,0.15);
    padding: 4px 10px;
    border-radius: 999px;
    font-size: 0.8em;
    color: var(--accent);
    font-weight: 700;
    margin-left: 8px;
    white-space: nowrap;
  }

  .pill.locked { border-color: var(--border); background: rgba(255,255,255,0.04); color: var(--muted); }

  .legend {
    color: var(--muted);
    font-size: 0.85em;
    line-height: 1.6;
    margin-top: 12px;
    padding: 12px;
    background: rgba(0,0,0,0.2);
    border-radius: 8px;
  }

  .building-card {
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px;
    margin-bottom: 8px;
    transition: all 0.2s ease;
  }

  .building-card:hover { background: rgba(255,255,255,0.08); border-color: rgba(255,204,102,0.4); }
  .building-card.locked { opacity: 0.4; }

  .building-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
  .building-name { font-weight: 700; font-size: 0.95em; }
  .building-count { color: var(--accent); font-weight: 700; font-size: 0.9em; }
  .building-stats { color: var(--muted); font-size: 0.85em; line-height: 1.4; }

  .setting-line { display: flex; gap: 8px; flex-wrap: wrap; }
  .setting-line button { flex: 1 1 140px; }

  .vol-control { margin: 12px 0; }
  .vol-label { display: block; font-weight: 600; margin-bottom: 6px; color: var(--accent); font-size: 0.9em; }

  input[type="range"] {
    width: 100%;
    height: 6px;
    border-radius: 3px;
    background: rgba(255,255,255,0.1);
    outline: none;
    -webkit-appearance: none;
    appearance: none;
  }

  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 16px; height: 16px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
    box-shadow: 0 0 10px rgba(255,204,102,0.4);
  }

  input[type="range"]::-moz-range-thumb {
    width: 16px; height: 16px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
    border: none;
    box-shadow: 0 0 10px rgba(255,204,102,0.4);
  }

  .raindrop {
    position: fixed;
    pointer-events: none;
    font-size: 24px;
    animation: fall linear forwards;
  }

  @keyframes fall {
    to { transform: translateY(100vh); opacity: 0; }
  }

  @media (max-width: 1000px) {
    body { overflow: auto; }
    #game { flex-direction: column; height: auto; min-height: 100vh; }
    #left { width: 100%; min-width: 0; border-right: none; border-bottom: 1px solid var(--border); max-height: 40vh; }
    #right { width: 100%; }
    .tabs { justify-content: center; }
  }

  @media (max-width: 600px) {
    h1 { font-size: 1.6em; margin-bottom: 12px; }
    .stats { margin: 12px auto; }
    .orb { width: min(200px, 50vw); margin-bottom: 16px; }
    #topbar { flex-direction: column; }
    .tabs { width: 100%; }
    .main-btn small { font-size: 0.8em; }
  }
</style>
</head>
<body>

<div id="rainContainer"></div>

<div id="game">
  <div id="left">
    <div id="topbar">
      <div id="prestigeBadge" title="Prestige points are permanent and give +10% production per level">
        ⭐ <span id="prestigeTop">0</span>
      </div>
      <div class="tabs">
        <button class="tab active" data-tab="shop">Shop</button>
        <button class="tab" data-tab="upgrades">Upgrades</button>
        <button class="tab" data-tab="stats">Stats</button>
        <button class="tab" data-tab="prestige">Prestige</button>
        <button class="tab" data-tab="achievements">Achievements</button>
        <button class="tab" data-tab="settings">Settings</button>
      </div>
    </div>

    <div id="shop" class="panel active"></div>
    <div id="upgrades" class="panel"></div>
    <div id="stats" class="panel"></div>
    <div id="prestigePanel" class="panel"></div>
    <div id="achievements" class="panel"></div>
    <div id="settings" class="panel"></div>
  </div>

  <div id="right">
    <h1>🔮 Candy Orb Idle</h1>
<img id="orrbImg" class="orb" src="orb.png.png" alt="Orb">
      <defs>
        <radialGradient id="orbGradient" cx="40%" cy="40%">
          <stop offset="0%" style="stop-color:#ff66cc;stop-opacity:1" />
          <stop offset="70%" style="stop-color:#ff1493;stop-opacity:1" />
          <stop offset="100%" style="stop-color:#8b0051;stop-opacity:1" />
        </radialGradient>
        <filter id="orbGlow">
          <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
          <feMerge>
            <feMergeNode in="coloredBlur"/>
            <feMergeNode in="SourceGraphic"/>
          </feMerge>
        </filter>
      </defs>
      <circle cx="100" cy="100" r="95" fill="url(#orbGradient)" filter="url(#orbGlow)" />
      <circle cx="75" cy="75" r="35" fill="rgba(255,255,255,0.3)" />
    </svg>

    <div class="stats">
      <div class="stat-row">
        <span class="stat-label">Candy Orbs:</span>
        <span class="stat-value" id="candyOrbs">0</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">CPS:</span>
        <span class="stat-value" id="cps">0</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">Click Power:</span>
        <span class="stat-value" id="clickPower">1</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">Crit Chance:</span>
        <span class="stat-value" id="critChance">10%</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">Hot Streak:</span>
        <span class="stat-value" id="hotStreak">0</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">Prestige Level:</span>
        <span class="stat-value" id="prestige">0</span>
      </div>
    </div>

    <div id="msg" style="margin:0;padding:8px 12px;"></div>

    <div class="legend">
      💡 Click the orb rapidly! The game automatically saves every 10 seconds. Collect enough candy and watch it rain! Prestige resets your progress but gives permanent bonuses.
    </div>
  </div>
</div>

<script>
(() => {
  const game = document.getElementById("game");
  const rainContainer = document.getElementById("rainContainer");

  const els = {
    candyOrbs: document.getElementById("candyOrbs"),
    cps: document.getElementById("cps"),
    clickPower: document.getElementById("clickPower"),
    critChance: document.getElementById("critChance"),
    prestige: document.getElementById("prestige"),
    prestigeTop: document.getElementById("prestigeTop"),
    msg: document.getElementById("msg"),
    shop: document.getElementById("shop"),
    upgrades: document.getElementById("upgrades"),
    stats: document.getElementById("stats"),
    prestigePanel: document.getElementById("prestigePanel"),
    achievements: document.getElementById("achievements"),
    settings: document.getElementById("settings"),
  };

  const state = {
    candyOrbs: 0,
    clickPower: 1,
    critChance: 0.10,
    critMult: 1,
    prestige: 0,
    prestigePoints: 0,
    prestigeSpent: 0,
    buildingMult: 1,
    clickMult: 1,
    costMult: 1,
    prestigeGainMult: 1,
    cpsFromUpgrades: 1,
    useShortFormat: true,
    sound: true,
    soundVolume: 0.4,
    clickSoundVol: 1.0,
    buySoundVol: 0.5,
    critSoundVol: 0.5,
    prestigeSoundVol: 0.5,
    particles: true,
    autoSave: true,
    clickUpgradesBought: new Set(),
    prestigeUpgradesBought: new Set(),
    achievementsDone: new Set(),
    totalClicks: 0,
    totalEarned: 0,
    totalSpent: 0,
    totalCrits: 0,
    hotStreak: 0,
    bestHotStreak: 0,
    buildings: [],
    upgrades: [],
    prestigeUpgrades: [],
    rainActive: false
  };

  function building(def) {
    return {
      id: def.id, name: def.name, emoji: def.emoji, desc: def.desc,
      baseCost: def.baseCost, cost: def.baseCost, baseCps: def.cps, cps: def.cps,
      count: 0, bonusMult: 1, tier: def.tier || 0, unlockAt: def.unlockAt || 0
    };
  }

  // ── BUILDINGS ──────────────────────────────────────────────────────────
  state.buildings = [
    building({ id:"candyMaker",        name:"Candy Maker",          emoji:"🍭", baseCost:15,            cps:0.2,        desc:"Basic candy production",               tier:1  }),
    building({ id:"sugarPlant",        name:"Sugar Plant",          emoji:"🌱", baseCost:100,           cps:1.5,        desc:"Grows sweet candy",                   tier:2,  unlockAt:50 }),
    building({ id:"candyFactory",      name:"Candy Factory",        emoji:"🏭", baseCost:1100,          cps:8,          desc:"Automated candy production",           tier:3,  unlockAt:500 }),
    building({ id:"chocolateVault",    name:"Chocolate Vault",      emoji:"🏛️", baseCost:12000,         cps:47,         desc:"Stores chocolate candy",               tier:4,  unlockAt:5000 }),
    building({ id:"candyCore",         name:"Candy Core",           emoji:"💎", baseCost:130000,        cps:260,        desc:"Essence of all candy",                 tier:5,  unlockAt:50000 }),
    building({ id:"dimensionRift",     name:"Dimension Rift",       emoji:"🌀", baseCost:1400000,       cps:1400,       desc:"Interdimensional candy production",    tier:6,  unlockAt:500000 }),
    building({ id:"infinityMachine",   name:"Infinity Machine",     emoji:"♾️", baseCost:20000000,      cps:7800,       desc:"Infinite candy loop",                  tier:7,  unlockAt:5000000 }),
    building({ id:"universeEngine",    name:"Universe Engine",      emoji:"🌌", baseCost:330000000,     cps:44000,      desc:"Entire universe produces candy",       tier:8,  unlockAt:50000000 }),
    building({ id:"omniFactory",       name:"Omni-Factory",         emoji:"🏗️", baseCost:5200000000,    cps:260000,     desc:"All realities at once",                tier:9,  unlockAt:500000000 }),
    building({ id:"candyGod",          name:"Candy God",            emoji:"👑", baseCost:84000000000,   cps:1560000,    desc:"Divine candy creation",                tier:10, unlockAt:5000000000 }),
    building({ id:"realityWarp",       name:"Reality Warp",         emoji:"⚡", baseCost:1400000000000, cps:9300000,    desc:"Bend reality for candy",               tier:11, unlockAt:50000000000 }),
    building({ id:"timeWeaver",        name:"Time Weaver",          emoji:"⏰", baseCost:2.3e13,        cps:56000000,   desc:"Control time itself",                  tier:12, unlockAt:500000000000 }),
  ];

  // ── REGULAR UPGRADES ──────────────────────────────────────────────────
  state.upgrades = [
    { id:"u_click1", name:"Sharper Tap",          emoji:"👆",   cost:25,         type:"click",    desc:"+1 click power",                      effect:()=>{ state.clickPower+=1; },              requires:[] },
    { id:"u_click2", name:"Double Tap",           emoji:"👆👆", cost:150,        type:"click",    desc:"+2 click power",                      effect:()=>{ state.clickPower+=2; },            requires:[] },
    { id:"u_click3", name:"Finger Boost",         emoji:"⚡",   cost:800,        type:"click",    desc:"+5 click power",                      effect:()=>{ state.clickPower+=5; },             requires:[] },
    { id:"u_click4", name:"Rapid Fire",           emoji:"🔥",   cost:4500,       type:"click",    desc:"+15 click power",                     effect:()=>{ state.clickPower+=15; },            requires:[] },
    { id:"u_click5", name:"Supersonic Tap",       emoji:"⚙️",   cost:28000,      type:"click",    desc:"+40 click power",                     effect:()=>{ state.clickPower+=40; },            requires:[] },
    { id:"u_click6", name:"Hyper Click",          emoji:"💥",   cost:200000,     type:"click",    desc:"Click power x2",                      effect:()=>{ state.clickPower*=2; },             requires:[] },
    { id:"u_click7", name:"Phantom Strike",       emoji:"👻",   cost:2000000,    type:"click",    desc:"Click power x2",                      effect:()=>{ state.clickPower*=2; },             requires:[] },
    { id:"u_click8", name:"Reality Punch",        emoji:"🌌",   cost:50000000,   type:"click",    desc:"Click power x3",                      effect:()=>{ state.clickPower*=3; },             requires:[] },

    { id:"u_crit1",  name:"Lucky Strike",         emoji:"🍀",   cost:400,        type:"crit",     desc:"+5% crit chance",                     effect:()=>{ state.critChance+=0.05; },          requires:[] },
    { id:"u_crit2",  name:"Critical Mind",        emoji:"🧠",   cost:2500,       type:"crit",     desc:"+10% crit chance",                    effect:()=>{ state.critChance+=0.10; },          requires:[] },
    { id:"u_crit3",  name:"Crit Mastery",         emoji:"⚔️",   cost:18000,      type:"crit",     desc:"+15% crit chance",                    effect:()=>{ state.critChance+=0.15; },          requires:[] },

  // ── HELPERS ──────────────────────────────────────────────────────────
  function getBuilding(id) { return state.buildings.find(b=>b.id===id); }
  function getBuildingCount(id) { const b=getBuilding(id); return b?b.count:0; }

  function formatNumber(n, decimals=0) {
    n = Number(n);
    if (!isFinite(n)) return "∞";
    if (!state.useShortFormat) {
      if (decimals > 0 && n < 1000000) {
        return n.toFixed(decimals);
      }
      return Math.floor(n).toLocaleString();
    }
    const units = ["","K","M","B","T","Qa","Qi","Sx","Sp","Oc","No","De","Ud","Dd","Td","Qad","Qid","Sxd","Spd","Ocd","Nod","Vg","UVg"];
    let value = Math.abs(n), u = 0;
    while (value >= 1000 && u < units.length - 1) { value /= 1000; u++; }
    if (u === 0) return value.toFixed(decimals);
    return value.toFixed(value >= 100 ? 0 : value >= 10 ? 1 : 2) + units[u];
  }

  function getPrestigeGain() {
    const requiredEarned = 100000;
    if (state.totalEarned < requiredEarned) return 0;
    return Math.max(0, Math.floor((Math.sqrt(state.totalEarned - requiredEarned + 1) / 100) * state.prestigeGainMult));
  }

  function getPrestigeMultiplier() { return Math.pow(1.10, state.prestige); }

  function getCPS() {
    let total = 0;
    for (const b of state.buildings) { total += b.count * b.baseCps * b.bonusMult; }
    return total * state.buildingMult * getPrestigeMultiplier() * state.cpsFromUpgrades;
  }

  function getBuildingPrice(b) {
    return Math.ceil(b.baseCost * Math.pow(1.15, b.count) * state.costMult);
  }

  function isRequirementMet(req) {
    if (req.type === "upgrade")        return state.clickUpgradesBought.has(req.id);
    if (req.type === "building")       return getBuildingCount(req.id) >= (req.count || 1);
    if (req.type === "prestige")       return state.prestige >= req.value;
    if (req.type === "prestigeUpgrade")return state.prestigeUpgradesBought.has(req.id);
    return false;
  }

  function requirementsText(reqs) {
    if (!reqs || !reqs.length) return "None";
    return reqs.map(r => {
      if (r.type === "upgrade")        { const u = state.upgrades.find(x=>x.id===r.id); return u?u.name:r.id; }
      if (r.type === "building")       { const b = getBuilding(r.id); return `${r.count||1} ${b?b.name:r.id}`; }
      if (r.type === "prestige")       return `Prestige ${r.value}`;
      if (r.type === "prestigeUpgrade"){ const p = state.prestigeUpgrades.find(x=>x.id===r.id); return p?p.name:r.id; }
      return "Unknown";
    }).join(", ");
  }

  function canBuyBuilding(b)         { return !isBuildingLocked(b) && state.candyOrbs >= getBuildingPrice(b); }
  function isBuildingLocked(b)       { return b.unlockAt > 0 && state.totalEarned < b.unlockAt; }
  function canBuyUpgrade(upg)        { return state.candyOrbs >= upg.cost && upg.requires.every(isRequirementMet); }
  function canBuyPrestigeUpgrade(upg){ return state.prestigePoints >= upg.cost && upg.requires.every(isRequirementMet); }

  function spawnRain() {

  // ── AUDIO ────────────────────────────────────────────────────────────
  let audioCtx = null;

  function ensureAudio() {
    if (!state.sound || state.soundVolume <= 0) return null;
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === "suspended") audioCtx.resume();
    return audioCtx;
  }

  function playTone(freq=330, duration=0.05, type="square", gainAmount=1, soundType="click") {
    const ctx = ensureAudio();
    if (!ctx) return;
    let soundVol = state.soundVolume;
    if (soundType==="click")   soundVol *= state.clickSoundVol;
    else if (soundType==="buy")soundVol *= state.buySoundVol;
    else if (soundType==="crit")soundVol *= state.critSoundVol;
    else if (soundType==="prestige")soundVol *= state.prestigeSoundVol;
    const finalGain = gainAmount * soundVol * 0.15;
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.type = type; o.frequency.value = freq;
    g.gain.value = 0;
    o.connect(g); g.connect(ctx.destination);
    const now = ctx.currentTime;
    g.gain.setValueAtTime(0, now);
    g.gain.linearRampToValueAtTime(finalGain, now + duration * 0.1);
    g.gain.exponentialRampToValueAtTime(0.001, now + duration);
    o.start(now); o.stop(now + duration + 0.01);
  }

  function playClickSound()  { playTone(420, 0.04, "square", 3, "click"); }
  function playBuySound()    { playTone(620, 0.08, "triangle", 1.2, "buy"); }
  function playCritSound()   { playTone(820, 0.1, "sawtooth", 1.5, "crit"); setTimeout(()=>playTone(1200,0.06,"square",1,"crit"),50); }
  function playPrestigeSound(){ playTone(220,0.15,"sine",1.2,"prestige"); setTimeout(()=>playTone(330,0.15,"sine",1.2,"prestige"),80); setTimeout(()=>playTone(440,0.15,"sine",1.2,"prestige"),160); }

  // ── CLICK HANDLER ─────────────────────────────────────────────────────
  function clickOrb(ev) {
    state.totalClicks += 1;
    const x = ev?.clientX ?? window.innerWidth / 2;
    const y = ev?.clientY ?? window.innerHeight / 2;

    let multiplier = 1, critText = "";
    const critRoll = Math.random();
    if (critRoll < Math.min(0.99, state.critChance)) {
      state.totalCrits += 1;
      state.hotStreak += 1;
      if (state.hotStreak > state.bestHotStreak) state.bestHotStreak = state.hotStreak;
      const r = Math.random();
      if      (r < 0.001) { multiplier=12; critText="💥 MAX OUTPUT x12"; }
      else if (r < 0.005) { multiplier=10; critText="🔥 Overload x10"; }
      else if (r < 0.02)  { multiplier=8;  critText="⚡ Surge x8"; }
      else if (r < 0.06)  { multiplier=6;  critText="🔥 Boost x6"; }
      else if (r < 0.15)  { multiplier=4;  critText="⚙️ Boost x4"; }
      else if (r < 0.35)  { multiplier=3;  critText="⚙️ Boost x3"; }
      else                { multiplier=2;  critText="⚠️ Lucky x2"; }
      multiplier = Math.max(1, Math.round(multiplier * state.critMult));
    } else {
      state.hotStreak = 0;
    }

    const gain = state.clickPower * state.clickMult * multiplier;
    state.candyOrbs += gain;
    state.totalEarned += gain;

    playClickSound();
    if (multiplier > 1) {
      playCritSound(); shake();
      spawnParticle(`x${multiplier}`, x, y, "#ffff00");
      if (critText) msg(critText);
    } else {
      spawnParticle("🍬", x, y);
    }

    checkAchievements();
    updateHUD();
  }

  // ── BUY FUNCTIONS ─────────────────────────────────────────────────────
  function buyBuilding(id) {
    const b = getBuilding(id);
    if (!b) return;

    if (isBuildingLocked(b)) {
      msg(`Locked — earn ${formatNumber(b.unlockAt)} first`, false);
      return;
    }

    const price = getBuildingPrice(b);
    if (state.candyOrbs < price) {
      msg(`Need ${formatNumber(price - state.candyOrbs)} more candy`, false);
      return;
    }

    state.candyOrbs -= price;
    state.totalSpent += price;
    b.count += 1;
    playBuySound();
    msg(`${b.name} bought! (${b.count})`);
    updateAll();
  }

  function buyUpgrade(id) {
    const upg = state.upgrades.find(u=>u.id===id);
    if (!upg) return;
    if (state.clickUpgradesBought.has(id)) { msg("Already bought", false); return; }
    if (!upg.requires.every(isRequirementMet)) { msg("Requirements not met", false); return; }
    if (state.candyOrbs < upg.cost) { msg(`Need ${formatNumber(upg.cost - state.candyOrbs)} more`, false); return; }

    state.candyOrbs -= upg.cost;
    state.totalSpent += upg.cost;
    state.clickUpgradesBought.add(id);
    upg.effect();
    playBuySound();
    msg(`${upg.name} unlocked!`);
    updateAll();
  }

  function buyPrestigeUpgrade(id) {
    const upg = state.prestigeUpgrades.find(p=>p.id===id);
    if (!upg) return;
    if (state.prestigeUpgradesBought.has(id)) { msg("Already purchased", false); return; }
    if (!upg.requires.every(isRequirementMet)) { msg("Requirements not met", false); return; }
    if (state.prestigePoints < upg.cost) { msg(`Need ${upg.cost - state.prestigePoints} more PP`, false); return; }

    state.prestigePoints -= upg.cost;
    state.prestigeSpent += upg.cost;
    state.prestigeUpgradesBought.add(id);
    upg.effect();
    playPrestigeSound();
    msg(`${upg.name} purchased!`);
    updateAll();
  }

  function prestigeReset() {
    const gain = getPrestigeGain();
    if (gain < 1) { msg("Need 100,000 total earned to prestige", false); return; }
    if (!confirm(`Prestige will reset your progress and give you ${gain} new prestige point(s). Your prestige upgrades stay. Continue?`)) return;

    state.prestige += gain;
    state.prestigePoints += gain;
    state.totalEarned = 0;
    state.candyOrbs = 0;
    state.clickPower = 1;
    state.critChance = 0.10;
    state.critMult = 1;
    state.hotStreak = 0;
    state.buildingMult = 1;
    state.clickMult = 1;
    state.costMult = 1;
    state.cpsFromUpgrades = 1;
    state.clickUpgradesBought.clear();

    for (const b of state.buildings) { b.count = 0; b.bonusMult = 1; }

    for (const upg of state.prestigeUpgrades) {
      if (state.prestigeUpgradesBought.has(upg.id)) upg.effect();
    }

    playPrestigeSound(); shake();
    msg(`Prestige! +${gain} point(s). Total: ${state.prestige}`);
    updateAll(); saveGame();
  }

  function checkAchievements() {
    for (const a of achievements) {
      if (!state.achievementsDone.has(a.id) && a.check()) {
        state.achievementsDone.add(a.id);
        a.reward();
        msg(`🏆 ${a.name}`);
        playTone(950, 0.1, "triangle", 2);
      }
    }
  }

  // ── RENDER FUNCTIONS ──────────────────────────────────────────────────
  function renderShop() {
    const scrollTop = els.shop.scrollTop;
    let html = "";
    for (const b of state.buildings) {
      const price = getBuildingPrice(b);
      const isLocked = isBuildingLocked(b);
      const isAffordable = state.candyOrbs >= price;
      const totalFromThis = b.count * b.baseCps * b.bonusMult * state.buildingMult * getPrestigeMultiplier();
      const cps = getCPS();
      const pct = cps > 0 ? (totalFromThis / cps * 100) : 0;
      const lockIcon = isLocked ? "🔒 " : "";
      const lockInfo = isLocked ? ` (Unlock at ${formatNumber(b.unlockAt)} earned)` : "";
      const affordClass = isAffordable ? "" : "cant-afford";

      html += `
        <div class="building-card${isLocked ? " locked" : ""}">
          <div class="building-header">
            <span class="building-name">${lockIcon}${b.emoji} ${b.name}</span>
            <span class="building-count">${b.count}</span>
          </div>
          <div class="building-stats">${b.desc} · ${formatNumber(b.baseCps, 2)} CPS each</div>
          <button class="main-btn ${affordClass}" type="button" data-buy-building="${b.id}"${isLocked ? " disabled" : ""}>
            Buy · <span class="pill">${formatNumber(price)}</span>
            ${isLocked
              ? `<small>Locked${lockInfo}</small>`
              : `<small>Own: ${b.count} · Output: ${formatNumber(totalFromThis, 2)} CPS (${pct.toFixed(1)}%)</small>`}
          </button>
        </div>`;
    }
    els.shop.innerHTML = html;
    els.shop.scrollTop = scrollTop;
    attachBuildingHandlers();
  }

  function renderUpgrades() {
    const scrollTop = els.upgrades.scrollTop;
    let html = `<div class="card"><div class="section-title">Regular Upgrades (${state.clickUpgradesBought.size}/${state.upgrades.length} bought)</div>`;
    for (const upg of state.upgrades) {
      const bought = state.clickUpgradesBought.has(upg.id);
      const locked = !upg.requires.every(isRequirementMet);
      const affordable = state.candyOrbs >= upg.cost;
      let status = affordable ? "Affordable" : "Need candy";
      if (bought) status = "Bought";
      else if (locked) status = "Locked";
      const statusClass = bought ? "" : locked ? "locked" : affordable ? "unlocked" : "";
      html += `
        <button class="main-btn ${statusClass}" type="button" data-buy-upgrade="${upg.id}"${bought ? " disabled" : ""}>
          ${upg.emoji} ${upg.name} <span class="pill${locked ? " locked" : ""}">${formatNumber(upg.cost)}</span>
          <small>${upg.desc}</small>
          <div class="upg-status ${locked ? "locked" : affordable && !bought ? "available" : ""}">${status}${locked ? ` · Needs: ${requirementsText(upg.requires)}` : ""}</div>
        </button>`;
    }
    html += `</div>`;
    els.upgrades.innerHTML = html;
    els.upgrades.scrollTop = scrollTop;
    attachUpgradeHandlers();
  }

  function renderStats() {
    const scrollTop = els.stats.scrollTop;
    const cps = getCPS();
    let html = `
      <div class="card">
        <div class="section-title">Game Statistics</div>
        <div class="stats">
          <div class="stat-row"><span class="stat-label">Total Candy Earned:</span><span class="stat-value">${formatNumber(state.totalEarned)}</span></div>
          <div class="stat-row"><span class="stat-label">Total Clicks:</span><span class="stat-value">${formatNumber(state.totalClicks)}</span></div>
          <div class="stat-row"><span class="stat-label">Total Crits:</span><span class="stat-value">${formatNumber(state.totalCrits)}</span></div>
          <div class="stat-row"><span class="stat-label">Total Spent:</span><span class="stat-value">${formatNumber(state.totalSpent)}</span></div>
          <div class="stat-row"><span class="stat-label">Best Hot Streak:</span><span class="stat-value">${state.bestHotStreak}</span></div>
          <div class="stat-row"><span class="stat-label">Current CPS:</span><span class="stat-value">${formatNumber(cps, 2)}</span></div>
        </div>
      </div>
      <div class="card">
        <div class="section-title">Building Counts</div>
        <div class="stats">
    `;
    for (const b of state.buildings) {
      if (b.count > 0) {
        html += `<div class="stat-row"><span class="stat-label">${b.emoji} ${b.name}:</span><span class="stat-value">${b.count}</span></div>`;
      }
    }
    html += `</div></div>`;
    els.stats.innerHTML = html;
    els.stats.scrollTop = scrollTop;
  }

  function renderPrestige() {
    const scrollTop = els.prestigePanel.scrollTop;
    const gain = getPrestigeGain();
    const canPrestige = gain >= 1;
    let html = `
      <div class="card">
        <div class="section-title">Prestige</div>
        <div class="stats">
          <div class="stat-row"><span class="stat-label">Total Earned (this run):</span><span class="stat-value">${formatNumber(state.totalEarned)}</span></div>
          <div class="stat-row"><span class="stat-label">Required for next:</span><span class="stat-value">100,000</span></div>
          <div class="stat-row"><span class="stat-label">Prestige Points Available:</span><span class="stat-value">${gain}</span></div>
          <div class="stat-row"><span class="stat-label">Total Prestige Level:</span><span class="stat-value">${state.prestige}</span></div>
        </div>
        <button class="main-btn${canPrestige ? " available-prestige" : " cant-afford"}" type="button" id="prestigeBtn"${canPrestige ? "" : " disabled"}>
          ${canPrestige ? `✨ Prestige and gain ${gain} point(s)` : "Not enough earned to prestige"}
        </button>
      </div>

      <div class="card">
        <div class="section-title">Prestige Upgrades (${state.prestigeUpgradesBought.size}/${state.prestigeUpgrades.length})</div>
    `;
    for (const upg of state.prestigeUpgrades) {
      const bought = state.prestigeUpgradesBought.has(upg.id);
      const affordable = state.prestigePoints >= upg.cost;
      let status = affordable ? "Affordable" : "Need points";
      if (bought) status = "Purchased";
      const statusClass = bought ? "" : affordable ? "unlocked" : "";
      html += `
        <button class="main-btn ${statusClass}" type="button" data-buy-prestige="${upg.id}"${bought ? " disabled" : ""}>
          ${upg.emoji} ${upg.name} <span class="pill${!affordable ? " locked" : ""}">${formatNumber(upg.cost)}</span>
          <small>${upg.desc}</small>
          <div class="upg-status ${!affordable ? "locked" : affordable && !bought ? "available" : ""}">${status}</div>
        </button>`;
    }
    html += `</div></div>`;
    els.prestigePanel.innerHTML = html;
    els.prestigePanel.scrollTop = scrollTop;
    attachPrestigeHandlers();
  }

  function renderAchievements() {
    const scrollTop = els.achievements.scrollTop;
    let html = `<div class="section-title">Achievements (${state.achievementsDone.size}/${achievements.length})</div>`;
    for (const a of achievements) {
      const done = state.achievementsDone.has(a.id);
      html += `
        <div class="achievement${done ? " done" : ""}">
          <div>
            <strong>${a.emoji} ${a.name}</strong>
            <small>${a.desc}</small>
          </div>
          <div style="text-align:right;">${done ? "✓" : "⧗"}</div>
        </div>`;
    }
    els.achievements.innerHTML = html;
    els.achievements.scrollTop = scrollTop;
  }

  function renderSettings() {
    const scrollTop = els.settings.scrollTop;
    let html = `
      <div class="card">
        <div class="section-title">Audio Settings</div>
        <div class="vol-control">
          <label class="vol-label">Master Volume: ${Math.round(state.soundVolume * 100)}%</label>
          <input type="range" min="0" max="100" value="${state.soundVolume * 100}" id="masterVol">
        </div>
        <div class="vol-control">
          <label class="vol-label">Click Sound: ${Math.round(state.clickSoundVol * 100)}%</label>
          <input type="range" min="0" max="100" value="${state.clickSoundVol * 100}" id="clickVol">
        </div>
        <div class="vol-control">
          <label class="vol-label">Buy Sound: ${Math.round(state.buySoundVol * 100)}%</label>
          <input type="range" min="0" max="100" value="${state.buySoundVol * 100}" id="buyVol">
        </div>
        <div class="vol-control">
          <label class="vol-label">Crit Sound: ${Math.round(state.critSoundVol * 100)}%</label>
          <input type="range" min="0" max="100" value="${state.critSoundVol * 100}" id="critVol">
        </div>
        <div class="vol-control">
          <label class="vol-label">Prestige Sound: ${Math.round(state.prestigeSoundVol * 100)}%</label>
          <input type="range" min="0" max="100" value="${state.prestigeSoundVol * 100}" id="prestigeVol">
        </div>
      </div>
      <div class="card">
        <div class="section-title">Game Settings</div>
        <div class="setting-line">
          <button class="main-btn" id="toggleShortFormat">${state.useShortFormat ? "🔤 Long Numbers" : "🔢 Short Format"}</button>
          <button class="main-btn" id="toggleParticles">${state.particles ? "🚫 No Particles" : "✨ Particles"}</button>
        </div>
        <div class="setting-line">
          <button class="main-btn" id="toggleSound">${state.sound ? "🔇 Mute" : "🔊 Unmute"}</button>
          <button class="main-btn" id="toggleAutoSave">${state.autoSave ? "⏸ Pause Auto-Save" : "▶ Resume Auto-Save"}</button>
        </div>
      </div>
      <div class="card">
        <div class="section-title">Save / Load</div>
        <div class="setting-line">
          <button class="main-btn" id="exportBtn">📥 Export Save</button>
          <button class="main-btn" id="importBtn">📤 Import Save</button>
        </div>
        <textarea class="savebox" id="saveData" readonly>${JSON.stringify(exportState())}</textarea>
      </div>
    `;
    els.settings.innerHTML = html;
    els.settings.scrollTop = scrollTop;
    attachSettingsHandlers();
  }

  function attachBuildingHandlers() {
    for (const btn of els.shop.querySelectorAll("[data-buy-building]")) {
      btn.addEventListener("click", ()=>buyBuilding(btn.dataset.buyBuilding));
    }
  }

  function attachUpgradeHandlers() {
    for (const btn of els.upgrades.querySelectorAll("[data-buy-upgrade]")) {
      btn.addEventListener("click", ()=>buyUpgrade(btn.dataset.buyUpgrade));
    }
  }

  function attachPrestigeHandlers() {
    const prestigeBtn = els.prestigePanel.querySelector("#prestigeBtn");
    if (prestigeBtn) prestigeBtn.addEventListener("click", prestigeReset);
    for (const btn of els.prestigePanel.querySelectorAll("[data-buy-prestige]")) {
      btn.addEventListener("click", ()=>buyPrestigeUpgrade(btn.dataset.buyPrestige));
    }
  }

  function attachSettingsHandlers() {
    document.getElementById("masterVol").addEventListener("input", (e)=>{ state.soundVolume = e.target.value / 100; updateAll(); });
    document.getElementById("clickVol").addEventListener("input", (e)=>{ state.clickSoundVol = e.target.value / 100; });
    document.getElementById("buyVol").addEventListener("input", (e)=>{ state.buySoundVol = e.target.value / 100; });
    document.getElementById("critVol").addEventListener("input", (e)=>{ state.critSoundVol = e.target.value / 100; });
    document.getElementById("prestigeVol").addEventListener("input", (e)=>{ state.prestigeSoundVol = e.target.value / 100; });
    document.getElementById("toggleShortFormat").addEventListener("click", ()=>{ state.useShortFormat=!state.useShortFormat; updateAll(); });
    document.getElementById("toggleParticles").addEventListener("click", ()=>{ state.particles=!state.particles; updateAll(); });
    document.getElementById("toggleSound").addEventListener("click", ()=>{ state.sound=!state.sound; updateAll(); });
    document.getElementById("toggleAutoSave").addEventListener("click", ()=>{ state.autoSave=!state.autoSave; updateAll(); });
    document.getElementById("exportBtn").addEventListener("click", ()=>{ document.getElementById("saveData").select(); });
    document.getElementById("importBtn").addEventListener("click", ()=>{ const data = prompt("Paste save data:"); if (data) importState(JSON.parse(data)); });
  }

  function updateHUD() {
    els.candyOrbs.textContent = formatNumber(state.candyOrbs);
    els.cps.textContent = formatNumber(getCPS(), 2);
    els.clickPower.textContent = formatNumber(state.clickPower);
    els.critChance.textContent = (state.critChance * 100).toFixed(1) + "%";
    els.prestige.textContent = state.prestige;
    els.prestigeTop.textContent = state.prestige;
  }

  function updateAll() {
    updateHUD();
    renderShop();
    renderUpgrades();
    renderStats();
    renderPrestige();
    renderAchievements();
    renderSettings();
    spawnRain();
  }

  function exportState() {
    return {
      candyOrbs: state.candyOrbs,
      clickPower: state.clickPower,
      critChance: state.critChance,
      critMult: state.critMult,
      prestige: state.prestige,
      prestigePoints: state.prestigePoints,
      prestigeSpent: state.prestigeSpent,
      buildingMult: state.buildingMult,
      clickMult: state.clickMult,
      costMult: state.costMult,
      prestigeGainMult: state.prestigeGainMult,
      totalClicks: state.totalClicks,
      totalEarned: state.totalEarned,
      totalSpent: state.totalSpent,
      totalCrits: state.totalCrits,
      hotStreak: state.hotStreak,
      bestHotStreak: state.bestHotStreak,
      buildings: state.buildings.map(b=>({ id:b.id, count:b.count, bonusMult:b.bonusMult })),
      clickUpgradesBought: Array.from(state.clickUpgradesBought),
      prestigeUpgradesBought: Array.from(state.prestigeUpgradesBought),
      achievementsDone: Array.from(state.achievementsDone)
    };
  }

  function importState(data) {
    state.candyOrbs = data.candyOrbs;
    state.clickPower = data.clickPower;
    state.critChance = data.critChance;
    state.critMult = data.critMult;
    state.prestige = data.prestige;
    state.prestigePoints = data.prestigePoints;
    state.prestigeSpent = data.prestigeSpent;
    state.buildingMult = data.buildingMult;
    state.clickMult = data.clickMult;
    state.costMult = data.costMult;
    state.prestigeGainMult = data.prestigeGainMult;
    state.totalClicks = data.totalClicks;
    state.totalEarned = data.totalEarned;
    state.totalSpent = data.totalSpent;
    state.totalCrits = data.totalCrits;
    state.hotStreak = data.hotStreak;
    state.bestHotStreak = data.bestHotStreak;
    for (const b of data.buildings) {
      const bld = getBuilding(b.id);
      if (bld) { bld.count = b.count; bld.bonusMult = b.bonusMult; }
    }
    state.clickUpgradesBought = new Set(data.clickUpgradesBought);
    state.prestigeUpgradesBought = new Set(data.prestigeUpgradesBought);
    state.achievementsDone = new Set(data.achievementsDone);
    updateAll();
    saveGame();
  }

  function saveGame() {
    localStorage.setItem("candyOrbIdleSave", JSON.stringify(exportState()));
  }

  function loadGame() {
    const saved = localStorage.getItem("candyOrbIdleSave");
    if (saved) {
      try {
        importState(JSON.parse(saved));
      } catch (e) {
        console.error("Failed to load save:", e);
      }
    }
  }

  // ── INIT & EVENT LISTENERS ─────────────────────────────────────────────
  document.querySelector(".orb").addEventListener("click", clickOrb);

  for (const tab of document.querySelectorAll(".tab")) {
    tab.addEventListener("click", ()=> {
      document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
      document.querySelectorAll(".panel").forEach(p=>p.classList.remove("active"));
      tab.classList.add("active");
      const panelId = tab.dataset.tab;
      const panel = document.getElementById(panelId);
      if (panel) panel.classList.add("active");
    });
  }

  setInterval(() => {
    const cps = getCPS();
    state.candyOrbs += cps / 10;
    state.totalEarned += cps / 10;
    updateHUD();
    checkAchievements();
  }, 100);

  setInterval(saveGame, 10000);

  loadGame();
  updateAll();
})();
</script>
</body>
</html>
