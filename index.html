<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Skittle Clicker - Idle Game</title>
<style>
  :root {
    --bg1: #1a0033;
    --bg2: #0d001a;
    --panel: rgba(0,0,0,0.5);
    --panel2: rgba(255,255,255,0.08);
    --text: #fff;
    --muted: rgba(255,255,255,0.65);
    --accent: #ffcc66;
    --accent2: #ff7bd5;
    --good: #6dff9a;
    --bad: #ff6b7d;
    --border: rgba(255,255,255,0.15);
    --gold: #ffd700;
  }

  * { box-sizing: border-box; }
  html, body { width: 100%; height: 100%; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: linear-gradient(135deg, var(--bg1), var(--bg2));
    color: var(--text);
    overflow: hidden;
    -webkit-user-select: none;
    user-select: none;
  }

  #game { display: flex; height: 100vh; width: 100vw; }

  #left {
    flex: 0 0 60%;
    min-width: 0;
    background: var(--panel);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    min-height: 0;
    backdrop-filter: blur(10px);
  }

  #right {
    flex: 0 0 40%;
    min-width: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
    position: relative;
    background: linear-gradient(180deg, rgba(255,102,204,0.06) 0%, transparent 100%);
    overflow-y: auto;
  }

  #game.shake { animation: shake 0.22s linear 1; }

  @keyframes shake {
    0% { transform: translate(0,0); }
    20% { transform: translate(-3px,1px); }
    40% { transform: translate(3px,-2px); }
    60% { transform: translate(-2px,2px); }
    80% { transform: translate(2px,-1px); }
    100% { transform: translate(0,0); }
  }

  h1 {
    margin: 0 0 12px 0;
    font-size: 1.6em;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  #topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    padding: 12px 14px;
    border-bottom: 1px solid var(--border);
    background: rgba(0,0,0,0.3);
    flex-wrap: wrap;
    width: 100%;
  }

  #prestigeBadge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-weight: 700;
    background: rgba(255,215,0,0.15);
    border: 1px solid rgba(255,215,0,0.4);
    border-radius: 999px;
    padding: 8px 14px;
    box-shadow: 0 0 20px rgba(255,215,0,0.15);
    font-size: 0.95em;
  }

  .tabs {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    justify-content: flex-end;
    flex: 1;
  }

  .tab {
    background: rgba(255,255,255,0.08);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
    cursor: pointer;
    transition: all 0.15s ease;
    font-weight: 600;
    font-size: 0.9em;
  }

  .tab:hover { background: rgba(255,255,255,0.12); transform: translateY(-1px); }

  .tab.active {
    background: linear-gradient(135deg, rgba(255,204,102,0.3), rgba(255,123,213,0.2));
    border-color: rgba(255,204,102,0.6);
    box-shadow: 0 0 15px rgba(255,204,102,0.15);
  }

  .panel {
    display: none;
    min-height: 0;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 12px;
    flex: 1;
  }

  .panel.active { display: block; }

  .panel::-webkit-scrollbar { width: 8px; }
  .panel::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); }
  .panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }
  .panel::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.3); }

  .stats {
    margin: 12px auto;
    max-width: 520px;
    line-height: 1.6;
    padding: 12px;
    background: rgba(255,255,255,0.06);
    border: 1px solid var(--border);
    border-radius: 12px;
    box-shadow: inset 0 0 20px rgba(255,102,204,0.08);
    font-size: 0.85em;
  }

  .stat-row { display: flex; justify-content: space-between; gap: 12px; margin: 6px 0; }
  .stat-label { color: var(--muted); }
  .stat-value { color: var(--accent); font-weight: 700; }

  .skittle {
    width: min(180px, 50vw);
    max-width: 180px;
    cursor: pointer;
    user-select: none;
    -webkit-user-drag: none;
    filter: drop-shadow(0 0 20px rgba(255,102,204,0.25));
    transition: transform 0.08s cubic-bezier(0.34,1.56,0.64,1);
    margin-bottom: 16px;
  }

  .skittle:active { transform: scale(0.92); }
  .skittle:hover { filter: drop-shadow(0 0 30px rgba(255,102,204,0.4)); }

  .main-btn {
    width: 100%;
    margin: 6px 0;
    padding: 12px 14px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    color: var(--text);
    background: linear-gradient(180deg, rgba(255,255,255,0.12), rgba(255,255,255,0.06));
    border: 1px solid rgba(255,255,255,0.15);
    text-align: left;
    transition: all 0.12s cubic-bezier(0.34,1.56,0.64,1);
    box-shadow: 0 4px 15px rgba(0,0,0,0.25);
    font-weight: 600;
    font-size: 0.95em;
  }

  .main-btn:hover:not([disabled]) {
    background: linear-gradient(180deg, rgba(255,255,255,0.18), rgba(255,255,255,0.1));
    border-color: rgba(255,204,102,0.5);
    box-shadow: 0 6px 20px rgba(0,0,0,0.35), 0 0 25px rgba(255,204,102,0.15);
    transform: translateY(-2px);
  }

  .main-btn:active:not([disabled]) { transform: translateY(0) scale(0.98); }
  .main-btn[disabled] { opacity: 0.35; cursor: not-allowed; }

  .main-btn small {
    display: block;
    margin-top: 4px;
    color: var(--muted);
    line-height: 1.4;
    font-weight: 500;
    font-size: 0.85em;
  }

  .main-btn.cant-afford { opacity: 0.5; }
  .main-btn.locked { opacity: 0.4; }
  .main-btn.unlocked { border-color: rgba(109,255,154,0.3); }
  .main-btn.available-prestige {
    border-color: rgba(255,215,0,0.4);
    background: linear-gradient(180deg, rgba(255,215,0,0.1), rgba(255,215,0,0.05));
  }

  .section-title {
    margin: 14px 0 10px;
    font-size: 0.85em;
    opacity: 0.8;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    font-weight: 700;
    color: var(--accent);
  }

  .card {
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px;
    margin-bottom: 12px;
  }

  .row { display: flex; gap: 8px; flex-wrap: wrap; }
  .row .main-btn { flex: 1 1 160px; }

  #msg {
    min-height: 24px;
    margin: 0;
    padding: 8px 12px;
    color: var(--accent);
    font-weight: 700;
    font-size: 0.95em;
    text-shadow: 0 0 10px rgba(255,204,102,0.3);
  }

  .particle {
    position: fixed;
    pointer-events: none;
    font-size: 20px;
    z-index: 9999;
    animation: floatUp 700ms ease-out forwards;
    text-shadow: 0 0 15px rgba(255,255,255,0.3);
    font-weight: 700;
  }

  @keyframes floatUp {
    0% { transform: translateY(0) scale(1) rotate(0deg); opacity: 1; }
    100% { transform: translateY(-100px) scale(1.2) rotate(8deg); opacity: 0; }
  }

  .achievement {
    display: flex;
    justify-content: space-between;
    gap: 12px;
    padding: 10px 12px;
    margin-bottom: 8px;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: rgba(255,255,255,0.04);
    transition: all 0.2s ease;
  }

  .achievement.done {
    border-color: rgba(109,255,154,0.4);
    background: rgba(109,255,154,0.08);
    box-shadow: 0 0 20px rgba(109,255,154,0.1);
  }

  .achievement small { color: var(--muted); display: block; font-size: 0.85em; }

  .upg-status { font-size: 0.8em; margin-top: 4px; color: var(--muted); font-weight: 600; }
  .upg-status.locked { color: var(--bad); }
  .upg-status.available { color: var(--good); }

  textarea.savebox {
    width: 100%;
    min-height: 100px;
    resize: vertical;
    background: rgba(0,0,0,0.4);
    color: var(--accent);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px;
    margin-top: 8px;
    font-family: 'Courier New', monospace;
    font-size: 0.85em;
  }

  .pill {
    display: inline-block;
    border: 1px solid var(--accent);
    background: rgba(255,204,102,0.15);
    padding: 4px 10px;
    border-radius: 999px;
    font-size: 0.8em;
    color: var(--accent);
    font-weight: 700;
    margin-left: 8px;
    white-space: nowrap;
  }

  .pill.locked { border-color: var(--border); background: rgba(255,255,255,0.04); color: var(--muted); }

  .legend {
    color: var(--muted);
    font-size: 0.85em;
    line-height: 1.6;
    margin-top: 12px;
    padding: 12px;
    background: rgba(0,0,0,0.2);
    border-radius: 8px;
  }

  .building-card {
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px;
    margin-bottom: 8px;
    transition: all 0.2s ease;
  }

  .building-card:hover { background: rgba(255,255,255,0.08); border-color: rgba(255,204,102,0.4); }
  .building-card.locked { opacity: 0.4; }

  .building-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
  .building-name { font-weight: 700; font-size: 0.95em; }
  .building-count { color: var(--accent); font-weight: 700; font-size: 0.9em; }
  .building-stats { color: var(--muted); font-size: 0.85em; line-height: 1.4; }

  .setting-line { display: flex; gap: 8px; flex-wrap: wrap; }
  .setting-line button { flex: 1 1 140px; }

  .vol-control { margin: 12px 0; }
  .vol-label { display: block; font-weight: 600; margin-bottom: 6px; color: var(--accent); font-size: 0.9em; }

  input[type="range"] {
    width: 100%;
    height: 6px;
    border-radius: 3px;
    background: rgba(255,255,255,0.1);
    outline: none;
    -webkit-appearance: none;
    appearance: none;
  }

  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 16px; height: 16px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
    box-shadow: 0 0 10px rgba(255,204,102,0.4);
  }

  input[type="range"]::-moz-range-thumb {
    width: 16px; height: 16px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
    border: none;
    box-shadow: 0 0 10px rgba(255,204,102,0.4);
  }

  @media (max-width: 1000px) {
    body { overflow: auto; }
    #game { flex-direction: column; height: auto; min-height: 100vh; }
    #left { width: 100%; min-width: 0; border-right: none; border-bottom: 1px solid var(--border); max-height: 40vh; }
    #right { width: 100%; }
    .tabs { justify-content: center; }
  }

  @media (max-width: 600px) {
    h1 { font-size: 1.6em; margin-bottom: 12px; }
    .stats { margin: 12px auto; }
    .skittle { width: min(200px, 50vw); margin-bottom: 16px; }
    #topbar { flex-direction: column; }
    .tabs { width: 100%; }
    .main-btn small { font-size: 0.8em; }
  }
</style>
</head>
<body>

<div id="game">
  <div id="left">
    <div id="topbar">
      <div id="prestigeBadge" title="Prestige points are permanent and give +10% production per level">
        ⭐ <span id="prestigeTop">0</span>
      </div>
      <div class="tabs">
        <button class="tab active" data-tab="shop">Shop</button>
        <button class="tab" data-tab="upgrades">Upgrades</button>
        <button class="tab" data-tab="prestige">Prestige</button>
        <button class="tab" data-tab="achievements">Achievements</button>
        <button class="tab" data-tab="settings">Settings</button>
      </div>
    </div>

    <div id="shop" class="panel active"></div>
    <div id="upgrades" class="panel"></div>
    <div id="prestigePanel" class="panel"></div>
    <div id="achievements" class="panel"></div>
    <div id="settings" class="panel"></div>
  </div>

  <div id="right">
    <h1>🍬 Skittle Clicker</h1>
<img id="skittleImg" class="7f0d8c40-f421-407b-95a7-c10d617091e0-removebg-preview.png" alt="Skittle">
      <ellipse cx="50" cy="108" rx="30" ry="8" fill="rgba(0,0,0,0.25)"/>
      <ellipse cx="50" cy="56" rx="34" ry="52" fill="#e8357a"/>
      <ellipse cx="50" cy="56" rx="34" ry="52" fill="url(#sg)"/>
      <ellipse cx="38" cy="38" rx="10" ry="14" fill="rgba(255,255,255,0.22)" transform="rotate(-18,38,38)"/>
      <ellipse cx="50" cy="72" rx="22" ry="12" fill="rgba(0,0,0,0.12)"/>
      <text x="50" y="62" text-anchor="middle" font-family="Arial Black,sans-serif" font-size="28" font-weight="900" fill="white" opacity="0.92">S</text>
      <defs>
        <radialGradient id="sg" cx="38%" cy="32%" r="62%">
          <stop offset="0%" stop-color="#ff80c0" stop-opacity="0.5"/>
          <stop offset="100%" stop-color="#7a0030" stop-opacity="0.3"/>
        </radialGradient>
      </defs>
    </svg>

    <div class="stats">
      <div class="stat-row">
        <span class="stat-label">Skittles:</span>
        <span class="stat-value" id="skittles">0</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">CPS:</span>
        <span class="stat-value" id="cps">0</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">Click Power:</span>
        <span class="stat-value" id="clickPower">1</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">Crit Chance:</span>
        <span class="stat-value" id="critChance">10%</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">Hot Streak:</span>
        <span class="stat-value" id="hotStreak">0</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">Prestige Level:</span>
        <span class="stat-value" id="prestige">0</span>
      </div>
    </div>

    <div id="msg" style="margin:0;padding:8px 12px;"></div>

    <div class="legend">
      💡 Click the skittle rapidly! The game automatically saves every 10 seconds. Prestige resets your progress but gives permanent bonuses.
    </div>
  </div>
</div>

<script>
(() => {
  const game = document.getElementById("game");
  const skittleImg = document.getElementById("skittleImg");

  const els = {
    skittles: document.getElementById("skittles"),
    cps: document.getElementById("cps"),
    clickPower: document.getElementById("clickPower"),
    critChance: document.getElementById("critChance"),
    prestige: document.getElementById("prestige"),
    prestigeTop: document.getElementById("prestigeTop"),
    msg: document.getElementById("msg"),
    shop: document.getElementById("shop"),
    upgrades: document.getElementById("upgrades"),
    prestigePanel: document.getElementById("prestigePanel"),
    achievements: document.getElementById("achievements"),
    settings: document.getElementById("settings"),
  };

  const state = {
    skittles: 0,
    clickPower: 1,
    critChance: 0.10,
    critMult: 1,
    prestige: 0,
    prestigePoints: 0,
    prestigeSpent: 0,
    buildingMult: 1,
    clickMult: 1,
    costMult: 1,
    prestigeGainMult: 1,
    cpsFromUpgrades: 1,
    useShortFormat: true,
    sound: true,
    soundVolume: 0.4,
    clickSoundVol: 1.0,
    buySoundVol: 0.5,
    critSoundVol: 0.5,
    prestigeSoundVol: 0.5,
    particles: true,
    autoSave: true,
    clickUpgradesBought: new Set(),
    prestigeUpgradesBought: new Set(),
    achievementsDone: new Set(),
    totalClicks: 0,
    totalEarned: 0,
    totalSpent: 0,
    totalCrits: 0,
    hotStreak: 0,
    bestHotStreak: 0,
    buildings: [],
    upgrades: [],
    prestigeUpgrades: []
  };

  function building(def) {
    return {
      id: def.id, name: def.name, emoji: def.emoji, desc: def.desc,
      baseCost: def.baseCost, cost: def.baseCost, baseCps: def.cps, cps: def.cps,
      count: 0, bonusMult: 1, tier: def.tier || 0, unlockAt: def.unlockAt || 0
    };
  }

  // ── BUILDINGS ──────────────────────────────────────────────────────────
  state.buildings = [
    building({ id:"sugarPlant",      name:"Sugar Plant",          emoji:"🌱", baseCost:15,            cps:0.1,        desc:"Basic skittle production",             tier:1  }),
    building({ id:"skittleFactory",  name:"Skittle Factory",      emoji:"🏭", baseCost:100,           cps:1,          desc:"Automated factory",                   tier:2,  unlockAt:50 }),
    building({ id:"candyWizard",     name:"Candy Wizard",         emoji:"🧙", baseCost:1100,          cps:8,          desc:"Magic candy production",               tier:3,  unlockAt:500 }),
    building({ id:"glitterMixer",    name:"Glitter Mixer",        emoji:"✨", baseCost:12000,         cps:47,         desc:"Sparkly skittles",                     tier:4,  unlockAt:5000 }),
    building({ id:"skittleCore",     name:"Skittle Core",         emoji:"💎", baseCost:130000,        cps:260,        desc:"Essence of skittles",                  tier:5,  unlockAt:50000 }),
    building({ id:"dimensionRift",   name:"Dimension Rift",       emoji:"🌀", baseCost:1400000,       cps:1400,       desc:"Interdimensional production",          tier:6,  unlockAt:500000 }),
    building({ id:"infinityMachine", name:"Infinity Machine",     emoji:"♾️", baseCost:20000000,      cps:7800,       desc:"Infinite skittle loop",                tier:7,  unlockAt:5000000 }),
    building({ id:"universeEngine",  name:"Universe Engine",      emoji:"🌌", baseCost:330000000,     cps:44000,      desc:"Entire universe produces skittles",    tier:8,  unlockAt:50000000 }),
    building({ id:"omniFactory",     name:"Omni-Factory",         emoji:"🏗️", baseCost:5200000000,    cps:260000,     desc:"All realities at once",                tier:9,  unlockAt:500000000 }),
    building({ id:"skittleGod",      name:"Skittle God",          emoji:"👑", baseCost:84000000000,   cps:1560000,    desc:"Divine skittle creation",              tier:10, unlockAt:5000000000 }),
    building({ id:"realityWarp",     name:"Reality Warp",         emoji:"⚡", baseCost:1400000000000, cps:9300000,    desc:"Bend reality for skittles",            tier:11, unlockAt:50000000000 }),
    building({ id:"timeWeaver",      name:"Time Weaver",          emoji:"⏰", baseCost:2.3e13,        cps:56000000,   desc:"Control time itself",                  tier:12, unlockAt:500000000000 }),
    building({ id:"quantumHarvest",  name:"Quantum Harvester",    emoji:"⚛️", baseCost:3.8e14,        cps:340000000,  desc:"Harvest quantum candy fields",         tier:13, unlockAt:5e12 }),
    building({ id:"stellarForge",    name:"Stellar Forge",        emoji:"🌟", baseCost:6.2e15,        cps:2.1e9,      desc:"Forge skittles from starlight",        tier:14, unlockAt:5e13 }),
    building({ id:"galacticMind",    name:"Galactic Mind",        emoji:"🧠", baseCost:1.05e17,       cps:1.3e10,     desc:"Galaxy-sized skittle consciousness",   tier:15, unlockAt:5e14 }),
    building({ id:"voidNexus",       name:"Void Nexus",           emoji:"🕳️", baseCost:1.8e18,        cps:8e10,       desc:"Siphon skittles from the void",        tier:16, unlockAt:5e15 }),
    building({ id:"crystalDim",      name:"Crystal Dimension",    emoji:"💠", baseCost:3e19,          cps:5e11,       desc:"Entire crystal universes of candy",    tier:17, unlockAt:5e16 }),
    building({ id:"infinityBloom",   name:"Infinity Bloom",       emoji:"🌸", baseCost:5e20,          cps:3e12,       desc:"Infinite candy flowers blooming",      tier:18, unlockAt:5e17 }),
    building({ id:"temporalGod",     name:"Temporal God",         emoji:"🕰️", baseCost:9e22,          cps:2e14,       desc:"Rewrite time for more skittles",       tier:19, unlockAt:5e18 }),
    building({ id:"theAbsolute",     name:"The Absolute",         emoji:"🌈", baseCost:2e26,          cps:1e18,       desc:"The origin of all candy existence",    tier:20, unlockAt:5e20 }),
  ];

  // ── REGULAR UPGRADES ──────────────────────────────────────────────────
  state.upgrades = [
    // ── Click upgrades ──────────────────────────
    { id:"u_click1", name:"Sharper Tap",          emoji:"👆",   cost:25,         type:"click",    desc:"+0.5 click power",                    effect:()=>{ state.clickPower+=0.5; },                     requires:[] },
    { id:"u_click2", name:"Double Tap",           emoji:"👆👆", cost:150,        type:"click",    desc:"+1.5 click power",                    effect:()=>{ state.clickPower+=1.5; },                     requires:[{type:"upgrade",id:"u_click1"}] },
    { id:"u_click3", name:"Finger Boost",         emoji:"⚡",   cost:800,        type:"click",    desc:"+4 click power",                      effect:()=>{ state.clickPower+=4; },                       requires:[{type:"upgrade",id:"u_click2"}] },

    { id:"a16", name:"Galaxy Brain",      emoji:"🧠",  desc:"Own a Galactic Mind",                  check:()=>getBuilding("galacticMind").count>=1,                         reward:()=>{ state.buildingMult*=4; } },
    { id:"a17", name:"Void Walker",       emoji:"🕳️",  desc:"Own a Void Nexus",                     check:()=>getBuilding("voidNexus").count>=1,                            reward:()=>{ state.buildingMult*=5; } },
    { id:"a18", name:"Prestige Legend",   emoji:"🏆",  desc:"Reach prestige 50",                    check:()=>state.prestige>=50,                                           reward:()=>{ state.clickMult*=2; state.buildingMult*=2; } },
    { id:"a19", name:"Click God",         emoji:"✋",  desc:"Click 10,000 times",                   check:()=>state.totalClicks>=10000,                                     reward:()=>{ state.clickPower*=3; } },
    { id:"a20", name:"Absolute Master",   emoji:"🌈",  desc:"Own The Absolute",                     check:()=>getBuilding("theAbsolute").count>=1,                          reward:()=>{ state.buildingMult*=10; state.clickMult*=5; } },
  ];

  // ── HELPERS ───────────────────────────────────────────────────────────
  function getBuilding(id) { return state.buildings.find(b=>b.id===id); }
  function getBuildingCount(id) { const b=getBuilding(id); return b?b.count:0; }

  function formatNumber(n) {
    n = Number(n);
    if (!isFinite(n)) return "∞";
    n = Math.floor(n);
    if (!state.useShortFormat) return n.toLocaleString();
    const units = ["","K","M","B","T","Qa","Qi","Sx","Sp","Oc","No","De","Ud","Dd","Td","Qad","Qid","Sxd","Spd","Ocd","Nod","Vg","UVg"];
    let value = Math.abs(n), u = 0;
    while (value >= 1000 && u < units.length - 1) { value /= 1000; u++; }
    if (u === 0) return Math.floor(value).toString();
    return value.toFixed(value >= 100 ? 0 : value >= 10 ? 1 : 2) + units[u];
  }

  function getPrestigeGain() {
    return Math.max(0, Math.floor((Math.sqrt(state.totalEarned) / 100) * state.prestigeGainMult));
  }

  function getPrestigeMultiplier() { return Math.pow(1.10, state.prestige); }

  function getCPS() {
    let total = 0;
    for (const b of state.buildings) { total += b.count * b.baseCps * b.bonusMult; }
    return total * state.buildingMult * getPrestigeMultiplier() * state.cpsFromUpgrades;
  }

  function getBuildingPrice(b) {
    return Math.ceil(b.baseCost * Math.pow(1.15, b.count) * state.costMult);
  }

  function isRequirementMet(req) {
    if (req.type === "upgrade")        return state.clickUpgradesBought.has(req.id);
    if (req.type === "building")       return getBuildingCount(req.id) >= (req.count || 1);
    if (req.type === "prestige")       return state.prestige >= req.value;
    if (req.type === "prestigeUpgrade")return state.prestigeUpgradesBought.has(req.id);
    return false;
  }

  function requirementsText(reqs) {
    if (!reqs || !reqs.length) return "None";
    return reqs.map(r => {
      if (r.type === "upgrade")        { const u = state.upgrades.find(x=>x.id===r.id); return u?u.name:r.id; }
      if (r.type === "building")       { const b = getBuilding(r.id); return `${r.count||1} ${b?b.name:r.id}`; }
      if (r.type === "prestige")       return `Prestige ${r.value}`;
      if (r.type === "prestigeUpgrade"){ const p = state.prestigeUpgrades.find(x=>x.id===r.id); return p?p.name:r.id; }
      return "Unknown";
    }).join(", ");
  }

  function canBuyBuilding(b)         { return !isBuildingLocked(b) && state.skittles >= getBuildingPrice(b); }
  function isBuildingLocked(b)       { return b.unlockAt > 0 && state.totalEarned < b.unlockAt; }
  function canBuyUpgrade(upg)        { return state.skittles >= upg.cost && upg.requires.every(isRequirementMet); }
  function canBuyPrestigeUpgrade(upg){ return state.prestigePoints >= upg.cost && upg.requires.every(isRequirementMet); }

  // ── AUDIO ─────────────────────────────────────────────────────────────
  let audioCtx = null;

  function ensureAudio() {
    if (!state.sound || state.soundVolume <= 0) return null;
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === "suspended") audioCtx.resume();
    return audioCtx;
  }

  function playTone(freq=330, duration=0.05, type="square", gainAmount=1, soundType="click") {
    const ctx = ensureAudio();
    if (!ctx) return;
    let soundVol = state.soundVolume;
    if (soundType==="click")   soundVol *= state.clickSoundVol;
    else if (soundType==="buy")soundVol *= state.buySoundVol;
    else if (soundType==="crit")soundVol *= state.critSoundVol;
    else if (soundType==="prestige")soundVol *= state.prestigeSoundVol;
    const finalGain = gainAmount * soundVol * 0.15;
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.type = type; o.frequency.value = freq;
    g.gain.value = 0;
    o.connect(g); g.connect(ctx.destination);
    const now = ctx.currentTime;
    g.gain.setValueAtTime(0, now);
    g.gain.linearRampToValueAtTime(finalGain, now + duration * 0.1);
    g.gain.exponentialRampToValueAtTime(0.001, now + duration);
    o.start(now); o.stop(now + duration + 0.01);
  }

  function playClickSound()  { playTone(420, 0.04, "square", 3, "click"); }
  function playBuySound()    { playTone(620, 0.08, "triangle", 1.2, "buy"); }
  function playCritSound()   { playTone(820, 0.1, "sawtooth", 1.5, "crit"); setTimeout(()=>playTone(1200,0.06,"square",1,"crit"),50); }
  function playPrestigeSound(){ playTone(220,0.15,"sine",1.2,"prestige"); setTimeout(()=>playTone(330,0.15,"sine",1.2,"prestige"),80); setTimeout(()=>playTone(440,0.15,"sine",1.2,"prestige"),160); }

  function shake() { game.classList.remove("shake"); void game.offsetWidth; game.classList.add("shake"); }

  function spawnParticle(text, x, y, color="white") {
    if (!state.particles) return;
    const p = document.createElement("div");
    p.className = "particle"; p.textContent = text;
    p.style.left = `${x}px`; p.style.top = `${y}px`; p.style.color = color;
    document.body.appendChild(p);
    setTimeout(()=>p.remove(), 750);
  }

  function msg(text, good=true) {
    els.msg.textContent = text;
    els.msg.style.color = good ? "var(--accent)" : "var(--bad)";
  }

  // ── CLICK HANDLER ─────────────────────────────────────────────────────
  function clickSkittle(ev) {
    state.totalClicks += 1;
    const x = ev?.clientX ?? window.innerWidth / 2;
    const y = ev?.clientY ?? window.innerHeight / 2;

    let multiplier = 1, critText = "";
    const critRoll = Math.random();
    if (critRoll < Math.min(0.99, state.critChance)) {
      state.totalCrits += 1;
      state.hotStreak += 1;
      if (state.hotStreak > state.bestHotStreak) state.bestHotStreak = state.hotStreak;
      const r = Math.random();
      if      (r < 0.001) { multiplier=12; critText="💥 MAX OUTPUT x12"; }
      else if (r < 0.005) { multiplier=10; critText="🔥 Overload x10"; }
      else if (r < 0.02)  { multiplier=8;  critText="⚡ Surge x8"; }
      else if (r < 0.06)  { multiplier=6;  critText="🔥 Boost x6"; }
      else if (r < 0.15)  { multiplier=4;  critText="⚙️ Boost x4"; }
      else if (r < 0.35)  { multiplier=3;  critText="⚙️ Boost x3"; }
      else                { multiplier=2;  critText="⚠️ Factory error x2"; }
      multiplier = Math.max(1, Math.round(multiplier * state.critMult));
    } else {
      state.hotStreak = 0;
    }

    const gain = state.clickPower * state.clickMult * multiplier;
    state.skittles += gain;
    state.totalEarned += gain;

    playClickSound();
    if (multiplier > 1) {
      playCritSound(); shake();
      spawnParticle(`x${multiplier}`, x, y, "#ffff00");
      if (critText) msg(critText);
    } else {
      spawnParticle("🍬", x, y);
    }

    checkAchievements();
    updateHUD();
  }

  // ── BUY FUNCTIONS ─────────────────────────────────────────────────────
  function buyBuilding(id) {
    const b = getBuilding(id);
    if (!b) return;

    if (isBuildingLocked(b)) {
      msg(`Locked — earn ${formatNumber(b.unlockAt)} first`, false);
      return;
    }

    const price = getBuildingPrice(b);
    if (state.skittles < price) {
      msg(`Need ${formatNumber(price - state.skittles)} more skittles`, false);
      return;
    }

    state.skittles -= price;
    state.totalSpent += price;
    b.count += 1;
    // cost is now always recalculated from baseCost, so b.cost is not needed
    playBuySound();
    msg(`${b.name} bought! (${b.count})`);
    updateAll();
  }

  function buyUpgrade(id) {
    const upg = state.upgrades.find(u=>u.id===id);
    if (!upg) return;
    if (state.clickUpgradesBought.has(id)) { msg("Already bought", false); return; }
    if (!upg.requires.every(isRequirementMet)) { msg("Requirements not met", false); return; }
    if (state.skittles < upg.cost) { msg(`Need ${formatNumber(upg.cost - state.skittles)} more`, false); return; }

    state.skittles -= upg.cost;
    state.totalSpent += upg.cost;
    state.clickUpgradesBought.add(id);
    upg.effect();
    playBuySound();
    msg(`${upg.name} unlocked!`);
    updateAll();
  }

  function buyPrestigeUpgrade(id) {
    const upg = state.prestigeUpgrades.find(p=>p.id===id);
    if (!upg) return;
    if (state.prestigeUpgradesBought.has(id)) { msg("Already purchased", false); return; }
    if (!upg.requires.every(isRequirementMet)) { msg("Requirements not met", false); return; }
    if (state.prestigePoints < upg.cost) { msg(`Need ${upg.cost - state.prestigePoints} more PP`, false); return; }

    state.prestigePoints -= upg.cost;
    state.prestigeSpent += upg.cost;
    state.prestigeUpgradesBought.add(id);
    upg.effect();
    playPrestigeSound();
    msg(`${upg.name} purchased!`);
    updateAll();
  }

  function prestigeReset() {
    const gain = getPrestigeGain();
    if (gain < 1) { msg("Need more total earned", false); return; }
    if (!confirm(`Prestige will reset your progress and give you ${gain} new prestige point(s). Your prestige upgrades stay. Continue?`)) return;

    state.prestige += gain;
    state.prestigePoints += gain;
    state.skittles = 0;
    state.clickPower = 1;
    state.critChance = 0.10;
    state.critMult = 1;
    state.hotStreak = 0;
    state.buildingMult = 1;
    state.clickMult = 1;
    state.costMult = 1;
    state.cpsFromUpgrades = 1;
    state.clickUpgradesBought.clear();

    for (const b of state.buildings) { b.count = 0; b.bonusMult = 1; }

    // Re-apply all still-purchased prestige upgrades
    for (const upg of state.prestigeUpgrades) {
      if (state.prestigeUpgradesBought.has(upg.id)) upg.effect();
    }

    playPrestigeSound(); shake();
    msg(`Prestige! +${gain} point(s). Total: ${state.prestige}`);
    updateAll(); saveGame();
  }

  function checkAchievements() {
    for (const a of achievements) {
      if (!state.achievementsDone.has(a.id) && a.check()) {
        state.achievementsDone.add(a.id);
        a.reward();
        msg(`🏆 ${a.name}`);
        playTone(950, 0.1, "triangle", 2);
      }
    }
  }

  // ── RENDER FUNCTIONS ──────────────────────────────────────────────────
  function renderShop() {
    const scrollTop = els.shop.scrollTop;
    let html = "";
    for (const b of state.buildings) {
      const price = getBuildingPrice(b);
      const isLocked = isBuildingLocked(b);
      const isAffordable = state.skittles >= price;
      const totalFromThis = b.count * b.baseCps * b.bonusMult * state.buildingMult * getPrestigeMultiplier();
      const cps = getCPS();
      const pct = cps > 0 ? (totalFromThis / cps * 100) : 0;
      const lockIcon = isLocked ? "🔒 " : "";
      const lockInfo = isLocked ? ` (Unlock at ${formatNumber(b.unlockAt)} earned)` : "";
      const affordClass = isAffordable ? "" : "cant-afford";

      html += `
        <div class="building-card${isLocked ? " locked" : ""}">
          <div class="building-header">
            <span class="building-name">${lockIcon}${b.emoji} ${b.name}</span>
            <span class="building-count">${b.count}</span>
          </div>
          <div class="building-stats">${b.desc} · ${formatNumber(b.baseCps)} CPS each</div>
          <button class="main-btn ${affordClass}" type="button" data-buy-building="${b.id}"${isLocked ? " disabled" : ""}>
            Buy · <span class="pill">${formatNumber(price)}</span>
            ${isLocked
              ? `<small>Locked${lockInfo}</small>`
              : `<small>Own: ${b.count} · Output: ${formatNumber(totalFromThis)} CPS (${pct.toFixed(1)}%)</small>`}
          </button>
        </div>`;
    }
    els.shop.innerHTML = html;
    els.shop.scrollTop = scrollTop;
    attachBuildingHandlers();
  }

  function renderUpgrades() {
    const scrollTop = els.upgrades.scrollTop;
    let html = `<div class="card"><div class="section-title">Regular Upgrades (${state.clickUpgradesBought.size}/${state.upgrades.length} bought)</div>`;
    for (const upg of state.upgrades) {
      const bought = state.clickUpgradesBought.has(upg.id);
      const locked = !upg.requires.every(isRequirementMet);
      const affordable = state.skittles >= upg.cost;
      let status = affordable ? "Affordable" : "Need skittles";
      if (bought) status = "Bought";
      else if (locked) status = "Locked";
      const statusClass = bought ? "" : locked ? "locked" : affordable ? "unlocked" : "";
      html += `
        <button class="main-btn ${statusClass}" type="button" data-buy-upgrade="${upg.id}"${bought ? " disabled" : ""}>
          ${upg.emoji} ${upg.name} <span class="pill${locked ? " locked" : ""}">${formatNumber(upg.cost)}</span>
          <small>${upg.desc}</small>
          <div class="upg-status ${locked ? "locked" : affordable && !bought ? "available" : ""}">${status}${locked ? ` · Needs: ${requirementsText(upg.requires)}` : ""}</div>
        </button>`;
    }
    html += `</div>`;
    els.upgrades.innerHTML = html;
    els.upgrades.scrollTop = scrollTop;
    document.querySelectorAll("[data-buy-upgrade]").forEach(btn => {
      btn.onclick = () => buyUpgrade(btn.dataset.buyUpgrade);
    });
  }

      </div>

        <div class="section-title">Prestige Upgrades (${state.prestigeUpgradesBought.size}/${state.prestigeUpgrades.length} bought)</div>`;

          <div class="upg-status${locked ? ' locked' : affordable && !bought ? ' available' : ''}">${status}${locked ? ` · Needs: ${requirementsText(upg.requires)}` : ""}</div>
        </button>`;
    }
    html += `</div>`;
    els.prestigePanel.innerHTML = html;

    const btn = document.getElementById("prestigeResetBtn");

  function updateHUD() {
    const cps = getCPS();
    els.skittles.textContent = formatNumber(state.skittles);
    els.cps.textContent = formatNumber(cps);
    els.clickPower.textContent = formatNumber(Math.floor(state.clickPower * state.clickMult * 100) / 100);
    els.critChance.textContent = Math.min(99, Math.floor(state.critChance * 100)) + "%";
    els.prestige.textContent = state.prestige;
    els.prestigeTop.textContent = state.prestige;
    const hotStreakEl = document.getElementById("hotStreak");
    if (hotStreakEl) { hotStreakEl.textContent = state.hotStreak; hotStreakEl.style.color = state.hotStreak > 0 ? "#ffff00" : "var(--accent)"; }
  }

  function updateAll() {
    updateHUD();
    renderShop();
    renderUpgrades();
    renderPrestigePanel();
    renderAchievements();
    renderSettings();
  }

  function attachBuildingHandlers() {
    document.querySelectorAll("[data-buy-building]").forEach(btn => {
      btn.onclick = () => buyBuilding(btn.dataset.buyBuilding);

  function openTab(id) {
    document.querySelectorAll(".panel").forEach(p=>p.classList.remove("active"));
    document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
    const panelId = id === "prestige" ? "prestigePanel" : id;
    const panel = document.getElementById(panelId);
    if (panel) panel.classList.add("active");
    document.querySelector(`.tab[data-tab="${id}"]`).classList.add("active");
  }

  // ── SAVE / LOAD ───────────────────────────────────────────────────────
  function getSaveData() {
    return {
      v: 2,
      skittles: state.skittles, clickPower: state.clickPower, critChance: state.critChance,
      critMult: state.critMult, prestige: state.prestige, prestigePoints: state.prestigePoints,
      buildingMult: state.buildingMult, clickMult: state.clickMult, costMult: state.costMult,
      prestigeGainMult: state.prestigeGainMult, cpsFromUpgrades: state.cpsFromUpgrades,
      useShortFormat: state.useShortFormat, sound: state.sound, soundVolume: state.soundVolume,
      clickSoundVol: state.clickSoundVol, buySoundVol: state.buySoundVol, critSoundVol: state.critSoundVol,
      prestigeSoundVol: state.prestigeSoundVol, particles: state.particles, autoSave: state.autoSave,
      totalClicks: state.totalClicks, totalEarned: state.totalEarned, totalSpent: state.totalSpent,
      totalCrits: state.totalCrits, bestHotStreak: state.bestHotStreak,
      buildings: state.buildings.map(b=>({ id:b.id, count:b.count, bonusMult:b.bonusMult })),
      clickUpgradesBought: [...state.clickUpgradesBought],
      prestigeUpgradesBought: [...state.prestigeUpgradesBought],
      achievementsDone: [...state.achievementsDone]
    };
  }

  function applySaveData(data) {
    if (!data || typeof data !== "object") throw new Error("Invalid save");
    state.skittles             = Number(data.skittles || 0);
    state.clickPower           = Number(data.clickPower || 1);
    state.critChance           = Number(data.critChance || 0.10);
    state.critMult             = Number(data.critMult || 1);
    state.prestige             = Number(data.prestige || 0);
    state.prestigePoints       = Number(data.prestigePoints || 0);
    state.buildingMult         = Number(data.buildingMult || 1);
    state.clickMult            = Number(data.clickMult || 1);
    state.costMult             = Number(data.costMult || 1);
    state.prestigeGainMult     = Number(data.prestigeGainMult || 1);
    state.cpsFromUpgrades      = Number(data.cpsFromUpgrades || 1);
    state.useShortFormat       = data.useShortFormat !== undefined ? !!data.useShortFormat : true;
    state.sound                = data.sound !== undefined ? !!data.sound : true;
    state.soundVolume          = Number(data.soundVolume ?? 0.4);
    state.clickSoundVol        = Number(data.clickSoundVol ?? 1.0);
    state.buySoundVol          = Number(data.buySoundVol ?? 0.5);
    state.critSoundVol         = Number(data.critSoundVol ?? 0.5);
    state.prestigeSoundVol     = Number(data.prestigeSoundVol ?? 0.5);
    state.particles            = data.particles !== undefined ? !!data.particles : true;
    state.autoSave             = data.autoSave !== undefined ? !!data.autoSave : true;
    state.totalClicks          = Number(data.totalClicks || 0);
    state.totalEarned          = Number(data.totalEarned || 0);
    state.totalSpent           = Number(data.totalSpent || 0);
    state.totalCrits           = Number(data.totalCrits || 0);
    state.bestHotStreak        = Number(data.bestHotStreak || 0);

    if (Array.isArray(data.buildings)) {
      for (const saved of data.buildings) {
        const b = getBuilding(saved.id);
        if (b) { b.count = Number(saved.count || 0); b.bonusMult = Number(saved.bonusMult || 1); }
      }
    }

    state.clickUpgradesBought   = new Set(Array.isArray(data.clickUpgradesBought)    ? data.clickUpgradesBought    : []);
    state.prestigeUpgradesBought= new Set(Array.isArray(data.prestigeUpgradesBought) ? data.prestigeUpgradesBought : []);
    state.achievementsDone      = new Set(Array.isArray(data.achievementsDone)        ? data.achievementsDone        : []);

    // Re-apply upgrade effects from bought upgrades
    for (const upg of state.upgrades) {
      if (state.clickUpgradesBought.has(upg.id)) {
        // Effects are already stored in state, don't double-apply
      }
    }
  }

  function saveGame() {
    try { localStorage.setItem("skittleClickerSave_v2", JSON.stringify(getSaveData())); return true; }
    catch(e) { return false; }
  }

  function loadGame() {
    const raw = localStorage.getItem("skittleClickerSave_v2")
             || localStorage.getItem("skittleClickerSave"); // legacy fallback
    if (!raw) return;
    try { applySaveData(JSON.parse(raw)); } catch(e) { console.warn("Load failed:", e); }
  }

  function exportSave() {
    const box = document.getElementById("saveBox");
    box.value = JSON.stringify(getSaveData());
    box.select();
    msg("Save exported! Copy the text above.");
  }

  function importSave() {
    const box = document.getElementById("saveBox");
    const raw = box.value.trim();
    if (!raw) { msg("Paste save data first", false); return; }
    try {
      applySaveData(JSON.parse(raw));
      updateAll(); saveGame();
      msg("Save imported!");
    } catch(e) { msg("Invalid save data", false); }
  }

  function wipeSave() {
    if (!confirm("Delete save from this device? This cannot be undone.")) return;
    localStorage.removeItem("skittleClickerSave_v2");
    localStorage.removeItem("skittleClickerSave");
    location.reload();
  }

  // ── GAME LOOP ─────────────────────────────────────────────────────────
  let shopRenderTimer = 0;
  function tick() {
    const cpsGain = getCPS() / 10;
    state.skittles += cpsGain;
    state.totalEarned += cpsGain;
    checkAchievements();
    updateHUD();

    // Re-render shop every 5 ticks (0.5s) so button states stay fresh
    shopRenderTimer++;
    if (shopRenderTimer >= 5) {
      shopRenderTimer = 0;
      renderShop();
    }
  }

  skittleImg.addEventListener("pointerdown", e => {
    e.preventDefault();
    if (audioCtx && audioCtx.state === "suspended") audioCtx.resume();
    clickSkittle(e);
  }, { passive: false });

  document.querySelectorAll(".tab").forEach(tab => {
    tab.addEventListener("click", () => openTab(tab.dataset.tab));
  });

  setInterval(tick, 100);
  setInterval(() => { if (state.autoSave) saveGame(); }, 10000);

  document.addEventListener("visibilitychange", () => {
    if (document.visibilityState === "hidden" && state.autoSave) saveGame();
  });
  window.addEventListener("beforeunload", () => { if (state.autoSave) saveGame(); });

  loadGame();
  updateAll();
  saveGame();
})();
</script>
</body>
</html>
